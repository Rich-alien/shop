<header class="header">
  <h3>Admin Panel</h3>
  <ui-button (click)="logout()">logout</ui-button>
</header>

<div class="container">
  <admin-create-product></admin-create-product>

  <section class="products-section">
    <div class="products-section__header">
      <p>Catalog</p>
      <h4>Список продуктов</h4>
    </div>

    @if (products$ | async; as products) {
      <div class="products-list">
        @for (product of products; track product.uuid) {
          <admin-product-item
            [uuid]="product.uuid"
            [name]="product.name"
            [description]="product.description"
            [price]="product.price"
            [createdAt]="product.createdAt"
          />
        } @empty {
          <p class="products-empty">Продукты пока не добавлены</p>
        }
      </div>
    } @else {
      <p class="products-empty">Загрузка продуктов...</p>
    }
  </section>
</div>

<router-outlet></router-outlet>
