<form [formGroup]="form" (ngSubmit)="create()">
  <div class="container">
    <ui-input>
      <input placeholder="name" formControlName="name">
    </ui-input>
    <ui-input>
      <input placeholder="description" formControlName="description"> <!--todo: transform to text-area-->
    </ui-input>
    <ui-input>
      <input [min]="0" placeholder="price" type="number" formControlName="price">
    </ui-input>
    <ui-button class="button"
               type="submit"
               [disabled]="form.invalid">Создать
    </ui-button>
  </div>
</form>
